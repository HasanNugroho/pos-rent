<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - POS Rental</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        * { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-100 via-slate-50 to-slate-100 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-slate-900 rounded-2xl mb-4 shadow-xl">
                <i class="fas fa-store text-white text-3xl"></i>
            </div>
            <h1 class="text-3xl font-bold text-slate-900 mb-2">POS Rental</h1>
            <p class="text-slate-600">Masuk ke dashboard Anda</p>
        </div>

        <!-- Login Card -->
        <div class="bg-white rounded-2xl shadow-xl border border-slate-200 p-8">
            <form onsubmit="event.preventDefault(); login();">
                <div class="space-y-5">
                    <!-- Email -->
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">
                            Email
                        </label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i class="fas fa-envelope text-slate-400"></i>
                            </div>
                            <input type="email" id="email" 
                                   placeholder="nama@email.com"
                                   class="w-full pl-11 pr-4 py-3 border-2 border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-slate-900 focus:border-transparent transition-all">
                        </div>
                    </div>

                    <!-- Password -->
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">
                            Password
                        </label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i class="fas fa-lock text-slate-400"></i>
                            </div>
                            <input type="password" id="password"
                                   placeholder="••••••••"
                                   class="w-full pl-11 pr-4 py-3 border-2 border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-slate-900 focus:border-transparent transition-all">
                        </div>
                    </div>

                    <!-- Remember & Forgot -->
                    <div class="flex items-center justify-between">
                        <label class="flex items-center cursor-pointer">
                            <input type="checkbox" class="w-4 h-4 rounded border-slate-300 text-slate-900 focus:ring-slate-900">
                            <span class="ml-2 text-sm text-slate-600">Ingat saya</span>
                        </label>
                        <a href="#" class="text-sm font-medium text-slate-900 hover:text-slate-700">
                            Lupa password?
                        </a>
                    </div>

                    <!-- Submit -->
                    <button type="submit" 
                            class="w-full py-3 px-4 bg-slate-900 text-white font-semibold rounded-lg hover:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-slate-900 focus:ring-offset-2 transition-all shadow-lg hover:shadow-xl">
                        <i class="fas fa-sign-in-alt mr-2"></i>
                        Masuk
                    </button>
                </div>
            </form>

            <!-- Divider -->
            <div class="relative my-6">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-slate-200"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-4 bg-white text-slate-500">Demo Accounts</span>
                </div>
            </div>

            <!-- Demo Accounts -->
            <div class="space-y-3">
                <div class="p-4 bg-slate-50 rounded-lg border border-slate-200 hover:border-slate-900 transition-all cursor-pointer"
                     onclick="fillDemo('owner@sepatu.com', 'password123')">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="font-semibold text-slate-900">Owner</p>
                            <p class="text-xs text-slate-500">owner@sepatu.com</p>
                        </div>
                        <span class="px-2 py-1 bg-blue-100 text-blue-800 text-xs font-medium rounded">Full Access</span>
                    </div>
                </div>
                <div class="p-4 bg-slate-50 rounded-lg border border-slate-200 hover:border-slate-900 transition-all cursor-pointer"
                     onclick="fillDemo('kasir@sepatu.com', 'password123')">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="font-semibold text-slate-900">Kasir</p>
                            <p class="text-xs text-slate-500">kasir@sepatu.com</p>
                        </div>
                        <span class="px-2 py-1 bg-green-100 text-green-800 text-xs font-medium rounded">POS Only</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Register Link -->
        <div class="text-center mt-6">
            <p class="text-slate-600">
                Belum punya akun? 
                <a href="register.html" class="font-semibold text-slate-900 hover:text-slate-700">
                    Daftar Sekarang
                </a>
            </p>
        </div>
    </div>

    <script>
        function fillDemo(email, password) {
            document.getElementById('email').value = email;
            document.getElementById('password').value = password;
        }

        function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email || !password) {
                alert('Mohon isi email dan password!');
                return;
            }

            // Simulate login
            alert('Login berhasil!\n\nEmail: ' + email + '\n\nMengalihkan ke dashboard...');
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
