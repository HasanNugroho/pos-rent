<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Outlets - Super Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        * { font-family: 'Inter', sans-serif; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-slate-50" x-data="adminOutletsApp()">
    <!-- Sidebar Superadmin -->
    <aside class="fixed left-0 top-0 h-screen w-64 bg-gradient-to-b from-purple-900 to-indigo-900 border-r border-purple-800 z-50">
        <div class="h-16 flex items-center px-6 border-b border-purple-800">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 rounded-lg bg-yellow-400 flex items-center justify-center">
                    <i class="fas fa-crown text-purple-900"></i>
                </div>
                <div>
                    <h1 class="text-lg font-bold text-white">Super Admin</h1>
                    <p class="text-xs text-purple-200">POS Rental System</p>
                </div>
            </div>
        </div>
        <nav class="p-4 space-y-1">
            <a href="admin-dashboard.html" class="flex items-center space-x-3 px-3 py-2.5 rounded-lg text-purple-100 hover:bg-white hover:bg-opacity-10">
                <i class="fas fa-chart-pie w-5"></i>
                <span class="font-medium">Dashboard</span>
            </a>
            <a href="admin-outlets.html" class="flex items-center space-x-3 px-3 py-2.5 rounded-lg bg-white bg-opacity-20 text-white">
                <i class="fas fa-store-alt w-5"></i>
                <span class="font-medium">Outlets</span>
            </a>
            <a href="admin-users.html" class="flex items-center space-x-3 px-3 py-2.5 rounded-lg text-purple-100 hover:bg-white hover:bg-opacity-10">
                <i class="fas fa-users-cog w-5"></i>
                <span class="font-medium">Users</span>
            </a>
            <a href="admin-subscriptions.html" class="flex items-center space-x-3 px-3 py-2.5 rounded-lg text-purple-100 hover:bg-white hover:bg-opacity-10">
                <i class="fas fa-credit-card w-5"></i>
                <span class="font-medium">Subscriptions</span>
            </a>
            <a href="admin-reports.html" class="flex items-center space-x-3 px-3 py-2.5 rounded-lg text-purple-100 hover:bg-white hover:bg-opacity-10">
                <i class="fas fa-file-invoice w-5"></i>
                <span class="font-medium">Reports</span>
            </a>
            <div class="pt-4 mt-4 border-t border-purple-800">
                <a href="admin-settings.html" class="flex items-center space-x-3 px-3 py-2.5 rounded-lg text-purple-100 hover:bg-white hover:bg-opacity-10">
                    <i class="fas fa-cog w-5"></i>
                    <span class="font-medium">Settings</span>
                </a>
                <a href="login.html" class="flex items-center space-x-3 px-3 py-2.5 rounded-lg text-purple-100 hover:bg-white hover:bg-opacity-10">
                    <i class="fas fa-sign-out-alt w-5"></i>
                    <span class="font-medium">Logout</span>
                </a>
            </div>
        </nav>
    </aside>

    <!-- Main Content -->
    <div class="ml-64">
        <!-- Header -->
        <header class="h-16 bg-white border-b border-slate-200 sticky top-0 z-40">
            <div class="h-full px-6 flex items-center justify-between">
                <div>
                    <h2 class="text-xl font-bold text-slate-900">Manage Outlets</h2>
                    <p class="text-sm text-slate-500">Kelola semua tenant/outlet</p>
                </div>
            </div>
        </header>

        <!-- Content -->
        <main class="p-6 space-y-6">
            <!-- Stats -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <div class="bg-white rounded-xl border border-slate-200 p-6 shadow-sm">
                    <p class="text-sm font-medium text-slate-500 mb-2">Total Outlets</p>
                    <p class="text-3xl font-bold text-slate-900">127</p>
                </div>
                <div class="bg-white rounded-xl border border-slate-200 p-6 shadow-sm">
                    <p class="text-sm font-medium text-slate-500 mb-2">Active</p>
                    <p class="text-3xl font-bold text-green-600">98</p>
                </div>
                <div class="bg-white rounded-xl border border-slate-200 p-6 shadow-sm">
                    <p class="text-sm font-medium text-slate-500 mb-2">Trial</p>
                    <p class="text-3xl font-bold text-yellow-600">15</p>
                </div>
                <div class="bg-white rounded-xl border border-slate-200 p-6 shadow-sm">
                    <p class="text-sm font-medium text-slate-500 mb-2">Inactive</p>
                    <p class="text-3xl font-bold text-red-600">14</p>
                </div>
            </div>

            <!-- Filters & Actions -->
            <div class="bg-white rounded-xl border border-slate-200 p-6 shadow-sm">
                <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between space-y-4 lg:space-y-0">
                    <div class="flex flex-col lg:flex-row space-y-3 lg:space-y-0 lg:space-x-3">
                        <div class="relative">
                            <i class="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
                            <input type="text" placeholder="Cari outlet..." 
                                   x-model="searchQuery"
                                   class="w-full lg:w-64 pl-10 pr-4 py-2.5 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-600">
                        </div>
                        <select x-model="filterStatus" class="px-4 py-2.5 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-600">
                            <option value="">Semua Status</option>
                            <option value="active">Active</option>
                            <option value="trial">Trial</option>
                            <option value="inactive">Inactive</option>
                        </select>
                    </div>
                    <button @click="showAddOutletModal = true" class="px-4 py-2.5 bg-purple-600 text-white rounded-lg hover:bg-purple-700 shadow-sm">
                        <i class="fas fa-plus mr-2"></i> Tambah Outlet
                    </button>
                </div>
            </div>

            <!-- Outlets Grid -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <template x-for="outlet in filteredOutlets" :key="outlet.id">
                    <div class="bg-white rounded-xl border-2 border-slate-200 shadow-sm hover:shadow-lg hover:border-purple-400 transition-all">
                        <div class="p-6">
                            <div class="flex items-start justify-between mb-4">
                                <img :src="'https://ui-avatars.com/api/?name=' + outlet.name + '&background=random&size=128'" 
                                     class="w-16 h-16 rounded-lg ring-2 ring-slate-200">
                                <span class="px-3 py-1 rounded-full text-xs font-semibold"
                                      :class="{
                                          'bg-green-100 text-green-800': outlet.status === 'active',
                                          'bg-yellow-100 text-yellow-800': outlet.status === 'trial',
                                          'bg-red-100 text-red-800': outlet.status === 'inactive'
                                      }"
                                      x-text="outlet.status.toUpperCase()"></span>
                            </div>

                            <h3 class="text-lg font-bold text-slate-900 mb-1" x-text="outlet.name"></h3>
                            <p class="text-sm text-slate-500 mb-4" x-text="outlet.id"></p>

                            <div class="space-y-2 mb-4 text-sm">
                                <div class="flex items-center text-slate-600">
                                    <i class="fas fa-user w-5 text-slate-400"></i>
                                    <span x-text="outlet.owner"></span>
                                </div>
                                <div class="flex items-center text-slate-600">
                                    <i class="fas fa-envelope w-5 text-slate-400"></i>
                                    <span x-text="outlet.email"></span>
                                </div>
                                <div class="flex items-center text-slate-600">
                                    <i class="fas fa-calendar w-5 text-slate-400"></i>
                                    <span x-text="'Joined ' + outlet.joinDate"></span>
                                </div>
                            </div>

                            <div class="grid grid-cols-3 gap-2 mb-4 pt-4 border-t border-slate-200">
                                <div class="text-center">
                                    <p class="text-xs text-slate-500">Users</p>
                                    <p class="text-lg font-bold text-slate-900" x-text="outlet.totalUsers"></p>
                                </div>
                                <div class="text-center">
                                    <p class="text-xs text-slate-500">Products</p>
                                    <p class="text-lg font-bold text-slate-900" x-text="outlet.totalProducts"></p>
                                </div>
                                <div class="text-center">
                                    <p class="text-xs text-slate-500">Bookings</p>
                                    <p class="text-lg font-bold text-slate-900" x-text="outlet.totalBookings"></p>
                                </div>
                            </div>

                            <div class="flex space-x-2">
                                <button @click="viewOutlet(outlet)" class="flex-1 px-3 py-2 border border-slate-200 rounded-lg text-sm hover:bg-slate-50">
                                    <i class="fas fa-eye mr-1"></i> View
                                </button>
                                <button @click="editOutlet(outlet)" class="flex-1 px-3 py-2 bg-purple-600 text-white rounded-lg text-sm hover:bg-purple-700">
                                    <i class="fas fa-edit mr-1"></i> Edit
                                </button>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </main>
    </div>

    <!-- Add Outlet Modal -->
    <div x-show="showAddOutletModal" x-cloak class="fixed inset-0 z-50 overflow-y-auto">
        <div class="flex items-center justify-center min-h-screen px-4">
            <div @click="showAddOutletModal = false" class="fixed inset-0 bg-slate-900 bg-opacity-75"></div>
            <div class="relative bg-white rounded-2xl p-6 w-full max-w-2xl shadow-xl">
                <div class="flex items-center justify-between mb-6">
                    <h3 class="text-xl font-semibold text-slate-900">Tambah Outlet Baru</h3>
                    <button @click="showAddOutletModal = false" class="text-slate-400 hover:text-slate-600">
                        <i class="fas fa-times text-xl"></i>
                    </button>
                </div>

                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-2">Nama Outlet</label>
                            <input type="text" class="w-full px-4 py-2.5 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-600">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-2">Nama Owner</label>
                            <input type="text" class="w-full px-4 py-2.5 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-600">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-2">Email</label>
                            <input type="email" class="w-full px-4 py-2.5 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-600">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-2">No. HP</label>
                            <input type="tel" class="w-full px-4 py-2.5 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-600">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">Alamat</label>
                        <textarea rows="2" class="w-full px-4 py-2.5 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-600"></textarea>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-2">Plan</label>
                            <select class="w-full px-4 py-2.5 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-600">
                                <option>Trial (14 hari)</option>
                                <option>Basic (Rp 99K/bulan)</option>
                                <option>Pro (Rp 199K/bulan)</option>
                                <option>Enterprise (Rp 499K/bulan)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-2">Status</label>
                            <select class="w-full px-4 py-2.5 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-600">
                                <option value="active">Active</option>
                                <option value="trial">Trial</option>
                                <option value="inactive">Inactive</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="flex space-x-3 mt-6">
                    <button @click="showAddOutletModal = false" class="flex-1 px-4 py-2.5 border-2 border-slate-200 rounded-lg hover:bg-slate-50">
                        Batal
                    </button>
                    <button @click="saveOutlet()" class="flex-1 px-4 py-2.5 bg-purple-600 text-white rounded-lg hover:bg-purple-700">
                        <i class="fas fa-save mr-2"></i> Buat Outlet
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function adminOutletsApp() {
            return {
                searchQuery: '',
                filterStatus: '',
                showAddOutletModal: false,
                
                outlets: [
                    { id: 'OUT-001', name: 'Sepatu Premium Jakarta', owner: 'Pak Budi', email: 'budi@sepatu.com', joinDate: 'Jan 2024', status: 'active', totalUsers: 5, totalProducts: 120, totalBookings: 456 },
                    { id: 'OUT-002', name: 'Sport Rental Bandung', owner: 'Ibu Siti', email: 'siti@sport.com', joinDate: 'Feb 2024', status: 'active', totalUsers: 3, totalProducts: 85, totalBookings: 234 },
                    { id: 'OUT-003', name: 'Quick Shoes Surabaya', owner: 'Pak Ahmad', email: 'ahmad@quick.com', joinDate: 'Mar 2024', status: 'trial', totalUsers: 2, totalProducts: 45, totalBookings: 67 },
                    { id: 'OUT-004', name: 'Rental Express Jogja', owner: 'Mas Eko', email: 'eko@express.com', joinDate: 'Mar 2024', status: 'active', totalUsers: 4, totalProducts: 92, totalBookings: 189 },
                    { id: 'OUT-005', name: 'Fast Rent Semarang', owner: 'Bu Dewi', email: 'dewi@fast.com', joinDate: 'Apr 2024', status: 'trial', totalUsers: 1, totalProducts: 28, totalBookings: 12 },
                    { id: 'OUT-006', name: 'Pro Rental Bali', owner: 'Pak Made', email: 'made@pro.com', joinDate: 'Dec 2023', status: 'inactive', totalUsers: 6, totalProducts: 156, totalBookings: 892 },
                ],
                
                get filteredOutlets() {
                    return this.outlets.filter(o => {
                        const matchSearch = !this.searchQuery || 
                            o.name.toLowerCase().includes(this.searchQuery.toLowerCase()) ||
                            o.owner.toLowerCase().includes(this.searchQuery.toLowerCase());
                        const matchStatus = !this.filterStatus || o.status === this.filterStatus;
                        return matchSearch && matchStatus;
                    });
                },
                
                viewOutlet(outlet) {
                    alert('View outlet: ' + outlet.name + '\n\nRedirect ke dashboard outlet ini...');
                },
                
                editOutlet(outlet) {
                    alert('Edit outlet: ' + outlet.name);
                    this.showAddOutletModal = true;
                },
                
                saveOutlet() {
                    alert('Outlet baru berhasil ditambahkan!\n\nEmail aktivasi akan dikirim ke owner.');
                    this.showAddOutletModal = false;
                }
            }
        }
    </script>
</body>
</html>
