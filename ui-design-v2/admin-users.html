<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users - Super Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        * { font-family: 'Inter', sans-serif; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-slate-50" x-data="adminUsersApp()">
    <!-- Sidebar Superadmin -->
    <aside class="fixed left-0 top-0 h-screen w-64 bg-gradient-to-b from-purple-900 to-indigo-900 border-r border-purple-800 z-50">
        <div class="h-16 flex items-center px-6 border-b border-purple-800">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 rounded-lg bg-yellow-400 flex items-center justify-center">
                    <i class="fas fa-crown text-purple-900"></i>
                </div>
                <div>
                    <h1 class="text-lg font-bold text-white">Super Admin</h1>
                    <p class="text-xs text-purple-200">POS Rental System</p>
                </div>
            </div>
        </div>
        <nav class="p-4 space-y-1">
            <a href="admin-dashboard.html" class="flex items-center space-x-3 px-3 py-2.5 rounded-lg text-purple-100 hover:bg-white hover:bg-opacity-10">
                <i class="fas fa-chart-pie w-5"></i>
                <span class="font-medium">Dashboard</span>
            </a>
            <a href="admin-outlets.html" class="flex items-center space-x-3 px-3 py-2.5 rounded-lg text-purple-100 hover:bg-white hover:bg-opacity-10">
                <i class="fas fa-store-alt w-5"></i>
                <span class="font-medium">Outlets</span>
            </a>
            <a href="admin-users.html" class="flex items-center space-x-3 px-3 py-2.5 rounded-lg bg-white bg-opacity-20 text-white">
                <i class="fas fa-users-cog w-5"></i>
                <span class="font-medium">Users</span>
            </a>
            <a href="admin-subscriptions.html" class="flex items-center space-x-3 px-3 py-2.5 rounded-lg text-purple-100 hover:bg-white hover:bg-opacity-10">
                <i class="fas fa-credit-card w-5"></i>
                <span class="font-medium">Subscriptions</span>
            </a>
            <a href="admin-reports.html" class="flex items-center space-x-3 px-3 py-2.5 rounded-lg text-purple-100 hover:bg-white hover:bg-opacity-10">
                <i class="fas fa-file-invoice w-5"></i>
                <span class="font-medium">Reports</span>
            </a>
            <div class="pt-4 mt-4 border-t border-purple-800">
                <a href="admin-settings.html" class="flex items-center space-x-3 px-3 py-2.5 rounded-lg text-purple-100 hover:bg-white hover:bg-opacity-10">
                    <i class="fas fa-cog w-5"></i>
                    <span class="font-medium">Settings</span>
                </a>
                <a href="login.html" class="flex items-center space-x-3 px-3 py-2.5 rounded-lg text-purple-100 hover:bg-white hover:bg-opacity-10">
                    <i class="fas fa-sign-out-alt w-5"></i>
                    <span class="font-medium">Logout</span>
                </a>
            </div>
        </nav>
    </aside>

    <!-- Main Content -->
    <div class="ml-64">
        <!-- Header -->
        <header class="h-16 bg-white border-b border-slate-200 sticky top-0 z-40">
            <div class="h-full px-6 flex items-center justify-between">
                <div>
                    <h2 class="text-xl font-bold text-slate-900">Manage Users</h2>
                    <p class="text-sm text-slate-500">Semua users dari semua outlets</p>
                </div>
            </div>
        </header>

        <!-- Content -->
        <main class="p-6 space-y-6">
            <!-- Stats -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <div class="bg-white rounded-xl border border-slate-200 p-6 shadow-sm">
                    <p class="text-sm font-medium text-slate-500 mb-2">Total Users</p>
                    <p class="text-3xl font-bold text-slate-900">2,456</p>
                </div>
                <div class="bg-white rounded-xl border border-slate-200 p-6 shadow-sm">
                    <p class="text-sm font-medium text-slate-500 mb-2">Owners</p>
                    <p class="text-3xl font-bold text-purple-600">127</p>
                </div>
                <div class="bg-white rounded-xl border border-slate-200 p-6 shadow-sm">
                    <p class="text-sm font-medium text-slate-500 mb-2">Staff</p>
                    <p class="text-3xl font-bold text-blue-600">2,329</p>
                </div>
                <div class="bg-white rounded-xl border border-slate-200 p-6 shadow-sm">
                    <p class="text-sm font-medium text-slate-500 mb-2">Active Today</p>
                    <p class="text-3xl font-bold text-green-600">1,847</p>
                </div>
            </div>

            <!-- Filters & Search -->
            <div class="bg-white rounded-xl border border-slate-200 p-6 shadow-sm">
                <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between space-y-4 lg:space-y-0">
                    <div class="flex flex-col lg:flex-row space-y-3 lg:space-y-0 lg:space-x-3">
                        <div class="relative">
                            <i class="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
                            <input type="text" placeholder="Cari user..." 
                                   x-model="searchQuery"
                                   class="w-full lg:w-64 pl-10 pr-4 py-2.5 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-600">
                        </div>
                        <select x-model="filterOutlet" class="px-4 py-2.5 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-600">
                            <option value="">Semua Outlet</option>
                            <option value="OUT-001">Sepatu Premium Jakarta</option>
                            <option value="OUT-002">Sport Rental Bandung</option>
                            <option value="OUT-003">Quick Shoes Surabaya</option>
                        </select>
                        <select x-model="filterRole" class="px-4 py-2.5 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-600">
                            <option value="">Semua Role</option>
                            <option value="owner">Owner</option>
                            <option value="admin">Admin</option>
                            <option value="kasir">Kasir</option>
                        </select>
                    </div>
                    <button class="px-4 py-2.5 border-2 border-purple-600 text-purple-600 rounded-lg hover:bg-purple-50">
                        <i class="fas fa-download mr-2"></i> Export CSV
                    </button>
                </div>
            </div>

            <!-- Users Table -->
            <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead class="bg-slate-50 border-b border-slate-200">
                            <tr>
                                <th class="px-6 py-3 text-left text-xs font-semibold text-slate-600 uppercase">User</th>
                                <th class="px-6 py-3 text-left text-xs font-semibold text-slate-600 uppercase">Outlet</th>
                                <th class="px-6 py-3 text-left text-xs font-semibold text-slate-600 uppercase">Role</th>
                                <th class="px-6 py-3 text-left text-xs font-semibold text-slate-600 uppercase">Status</th>
                                <th class="px-6 py-3 text-left text-xs font-semibold text-slate-600 uppercase">Last Login</th>
                                <th class="px-6 py-3 text-left text-xs font-semibold text-slate-600 uppercase">Actions</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-200">
                            <template x-for="user in filteredUsers" :key="user.id">
                                <tr class="hover:bg-slate-50">
                                    <td class="px-6 py-4">
                                        <div class="flex items-center space-x-3">
                                            <img :src="'https://ui-avatars.com/api/?name=' + user.name + '&background=random'" 
                                                 class="w-10 h-10 rounded-full">
                                            <div>
                                                <p class="font-medium text-slate-900" x-text="user.name"></p>
                                                <p class="text-sm text-slate-500" x-text="user.email"></p>
                                            </div>
                                        </div>
                                    </td>
                                    <td class="px-6 py-4">
                                        <p class="text-sm text-slate-900" x-text="user.outlet"></p>
                                        <p class="text-xs text-slate-500" x-text="user.outletId"></p>
                                    </td>
                                    <td class="px-6 py-4">
                                        <span class="px-2 py-1 rounded-full text-xs font-medium"
                                              :class="{
                                                  'bg-purple-100 text-purple-800': user.role === 'owner',
                                                  'bg-blue-100 text-blue-800': user.role === 'admin',
                                                  'bg-green-100 text-green-800': user.role === 'kasir'
                                              }"
                                              x-text="user.role.toUpperCase()"></span>
                                    </td>
                                    <td class="px-6 py-4">
                                        <span class="px-2 py-1 rounded-full text-xs font-medium"
                                              :class="user.status === 'active' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'"
                                              x-text="user.status === 'active' ? 'Active' : 'Inactive'"></span>
                                    </td>
                                    <td class="px-6 py-4 text-sm text-slate-600" x-text="user.lastLogin"></td>
                                    <td class="px-6 py-4">
                                        <div class="flex space-x-2">
                                            <button @click="viewUser(user)" class="p-2 text-blue-600 hover:bg-blue-50 rounded-lg">
                                                <i class="fas fa-eye"></i>
                                            </button>
                                            <button @click="suspendUser(user)" class="p-2 text-red-600 hover:bg-red-50 rounded-lg">
                                                <i class="fas fa-ban"></i>
                                            </button>
                                        </div>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        function adminUsersApp() {
            return {
                searchQuery: '',
                filterOutlet: '',
                filterRole: '',
                
                users: [
                    { id: 1, name: 'Pak Budi', email: 'budi@sepatu.com', outlet: 'Sepatu Premium Jakarta', outletId: 'OUT-001', role: 'owner', status: 'active', lastLogin: '2 mins ago' },
                    { id: 2, name: 'Ahmad Kasir', email: 'ahmad@sepatu.com', outlet: 'Sepatu Premium Jakarta', outletId: 'OUT-001', role: 'kasir', status: 'active', lastLogin: '15 mins ago' },
                    { id: 3, name: 'Ibu Siti', email: 'siti@sport.com', outlet: 'Sport Rental Bandung', outletId: 'OUT-002', role: 'owner', status: 'active', lastLogin: '1 hour ago' },
                    { id: 4, name: 'Rina Admin', email: 'rina@sport.com', outlet: 'Sport Rental Bandung', outletId: 'OUT-002', role: 'admin', status: 'active', lastLogin: '3 hours ago' },
                    { id: 5, name: 'Pak Ahmad', email: 'ahmad@quick.com', outlet: 'Quick Shoes Surabaya', outletId: 'OUT-003', role: 'owner', status: 'active', lastLogin: '5 hours ago' },
                    { id: 6, name: 'Dedi Kasir', email: 'dedi@quick.com', outlet: 'Quick Shoes Surabaya', outletId: 'OUT-003', role: 'kasir', status: 'inactive', lastLogin: '2 days ago' },
                ],
                
                get filteredUsers() {
                    return this.users.filter(u => {
                        const matchSearch = !this.searchQuery || 
                            u.name.toLowerCase().includes(this.searchQuery.toLowerCase()) ||
                            u.email.toLowerCase().includes(this.searchQuery.toLowerCase());
                        const matchOutlet = !this.filterOutlet || u.outletId === this.filterOutlet;
                        const matchRole = !this.filterRole || u.role === this.filterRole;
                        return matchSearch && matchOutlet && matchRole;
                    });
                },
                
                viewUser(user) {
                    alert('View user detail:\n\n' + user.name + '\n' + user.email + '\n' + user.outlet);
                },
                
                suspendUser(user) {
                    if (confirm('Suspend user ' + user.name + '?\n\nUser tidak akan bisa login.')) {
                        alert('User berhasil di-suspend!');
                    }
                }
            }
        }
    </script>
</body>
</html>
